# Reference documentation for edges.yaml. The authoritative validator is
# claim_dag/schema.py (validate_edges); keep this file in sync with it.
type: array
items:
  type: object
  required: [id, from, to, relation, verdict]
  properties:
    id:
      type: string
      pattern: "^E[0-9]{3,}$"
    from:
      type: array
      minItems: 1
      description: Source claims. Multiple ids = one conjunctive (joint) premise set.
      items:
        type: string
        pattern: "^C[0-9]{3,}$"
    to:
      type: string
      pattern: "^C[0-9]{3,}$"
    relation:
      enum: [supports, requires, rebuts, qualifies]
      description: Only supports/requires count as support; rebuts/qualifies do not.
    suppressed_premise:
      type: string
    verdict:
      enum: [unaudited, cleared, weakened, failed, deferred]
    audit:
      type: string
    notes:
      type: string
