# Reference documentation for claims.yaml. The authoritative validator is
# claim_dag/schema.py (validate_claims); keep this file in sync with it.
type: array
items:
  type: object
  required: [id, anchor, type, section, verdict]
  properties:
    id:
      type: string
      pattern: "^C[0-9]{3,}$"
    anchor:
      type: string
      description: Verbatim text span from the paper (so drift is detectable).
    type:
      enum: [definition, empirical-premise, cited-claim, inference, stipulation]
    section:
      type: string
    verdict:
      enum: [unaudited, cleared, weakened, failed, deferred]
      description: Outcome axis only. A claim needs auditing iff verdict is unaudited.
    background:
      type: boolean
      description: Mark off-spine framing so the decorative-premise check ignores it.
    warrant:
      type: string
    source:
      type: string
    evidence:
      type: string
    notes:
      type: string
